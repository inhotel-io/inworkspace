# Stalwart on an EXISTING GKE cluster (zero new compute) — SAFE MODE.
# Reuses the same Cloud SQL Postgres as the VM path; config.json is identical.
#
# Prereqs (see deploy/gke/README.md):
#   kubectl create namespace stalwart
#   # Secret sourced from Secret Manager (e.g. External Secrets Operator, or manually):
#   kubectl -n stalwart create secret generic stalwart-secrets \
#     --from-literal=POSTGRES_PASSWORD='***' \
#     --from-literal=STALWART_RECOVERY_ADMIN='admin:***'
#   # config.json rendered from deploy/config/config.json.template (POSTGRES_HOST filled):
#   kubectl -n stalwart create configmap stalwart-config --from-file=config.json
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: stalwart
  namespace: stalwart
spec:
  serviceName: stalwart
  replicas: 1
  selector:
    matchLabels: { app: stalwart }
  template:
    metadata:
      labels: { app: stalwart }
    spec:
      securityContext:
        fsGroup: 2000
      containers:
        - name: stalwart
          image: docker.io/stalwartlabs/stalwart:latest   # pin a digest for prod
          args: ["--config", "/etc/stalwart/config.json"]
          securityContext:
            runAsUser: 2000
            runAsGroup: 2000
            capabilities:
              add: ["NET_BIND_SERVICE"]
          envFrom:
            - secretRef: { name: stalwart-secrets }
          ports:
            - { containerPort: 443,  name: https }
            - { containerPort: 8080, name: http }
            - { containerPort: 25,   name: smtp }
            - { containerPort: 587,  name: submission }
            - { containerPort: 465,  name: submissions }
            - { containerPort: 143,  name: imap }
            - { containerPort: 993,  name: imaps }
            - { containerPort: 4190, name: sieve }
          readinessProbe:
            httpGet: { path: /healthz/ready, port: 8080 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz/live, port: 8080 }
            initialDelaySeconds: 20
            periodSeconds: 30
          resources:
            requests: { cpu: "250m", memory: "512Mi" }
            limits:   { cpu: "1",    memory: "1536Mi" }
          volumeMounts:
            - { name: config, mountPath: /etc/stalwart }
            - { name: data,   mountPath: /var/lib/stalwart }
      volumes:
        - name: config
          configMap: { name: stalwart-config }
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: ["ReadWriteOnce"]
        resources: { requests: { storage: 10Gi } }
---
# SAFE MODE: ClusterIP only. Do NOT switch to a public LoadBalancer / expose :25
# until the mail path is hardened (see deploy/README.md → DEFERRED / FOLLOW-UPS).
apiVersion: v1
kind: Service
metadata:
  name: stalwart
  namespace: stalwart
spec:
  type: ClusterIP
  selector: { app: stalwart }
  ports:
    - { name: https, port: 443,  targetPort: 443 }
    - { name: http,  port: 8080, targetPort: 8080 }
    - { name: imaps, port: 993,  targetPort: 993 }
    - { name: submission, port: 587, targetPort: 587 }
